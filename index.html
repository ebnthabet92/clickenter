<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Enter | Invoice</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #0a0f1e 0%, #0d1525 50%, #0a0f1e 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    width: 100%;
    max-width: 500px;
}

/* Panel */
.panel {
    background: rgba(15, 25, 45, 0.9);
    border-radius: 16px;
    padding: 15px;
    margin-bottom: 15px;
    border: 1px solid rgba(0, 217, 255, 0.3);
}

.panel input {
    width: 100%;
    padding: 8px 12px;
    margin: 4px 0;
    background: #0f172a;
    border: 1px solid rgba(0, 217, 255, 0.3);
    border-radius: 10px;
    color: white;
    font-size: 13px;
    font-family: 'Cairo', sans-serif;
    outline: none;
}

.btn-group {
    display: flex;
    gap: 8px;
    margin-top: 8px;
}

button {
    flex: 1;
    padding: 8px;
    font-size: 13px;
    font-family: 'Cairo', sans-serif;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
}

.btn-primary {
    background: linear-gradient(135deg, #00d9ff, #0099cc);
    color: white;
}

.btn-secondary {
    background: linear-gradient(135deg, #9c00d2, #6a0080);
    color: white;
}

/* INVOICE - مدمجة جداً */
.invoice {
    background: #111827;
    border-radius: 18px;
    padding: 12px 15px;
    border: 1px solid #00d9ff40;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
}

/* Brand - صغير جداً */
.brand {
    text-align: center;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid #00d9ff;
}

.logo {
    width: 35px;
    height: 35px;
    margin: 0 auto 4px auto;
    background: #1e293b;
    border-radius: 50%;
    padding: 4px;
    border: 1.5px solid #00d9ff;
}

.logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 50%;
}

.brand h1 {
    margin: 0;
    font-size: 18px;
    color: #00d9ff;
    font-weight: 800;
}

.brand p {
    margin: 2px 0;
    font-size: 8px;
    color: #94a3b8;
}

.brand span {
    font-size: 7px;
    color: #00d9ff;
    background: #0f172a;
    padding: 2px 6px;
    border-radius: 10px;
    display: inline-block;
}

/* الصفوف - أقصى ضغط */
.row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 6px;
}

.box {
    background: #0f172a;
    padding: 5px 8px;
    border-radius: 10px;
    border: 1px solid #00d9ff15;
}

.box h3 {
    margin: 0;
    font-size: 7px;
    color: #38bdf8;
    font-weight: 700;
}

.box p {
    margin: 3px 0 0;
    font-size: 11px;
    font-weight: 700;
    color: white;
    word-break: break-word;
}

/* الإجمالي */
.total {
    margin-top: 8px;
    padding: 6px;
    text-align: center;
    font-size: 13px;
    font-weight: 800;
    background: #0f172a;
    border-radius: 10px;
    border: 1px solid #22c55e;
    color: #22c55e;
}

/* واتساب */
.whatsapp {
    text-align: center;
    margin-top: 6px;
    padding: 4px;
    background: #075e5410;
    border-radius: 20px;
    border: 1px solid #25D366;
}

.whatsapp a {
    color: #25D366;
    text-decoration: none;
    font-weight: 700;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
}

/* Footer */
.invoice-footer {
    margin-top: 8px;
    padding-top: 6px;
    text-align: center;
    font-size: 7px;
    color: #64748b;
    border-top: 1px solid #00d9ff20;
    display: flex;
    justify-content: space-between;
}

.invoice-footer .thanks {
    color: #38bdf8;
}

/* موبايل */
@media (max-width: 550px) {
    .container { max-width: 450px; }
    .invoice { padding: 10px 12px; }
    .box p { font-size: 10px; }
    .brand h1 { font-size: 16px; }
    .logo { width: 30px; height: 30px; }
}
</style>
</head>
<body>
<div class="container">
    <div class="panel">
        <input id="name" placeholder="👤 الاسم">
        <input id="pay" placeholder="💰 طريقة الدفع">
        <input id="order" placeholder="📦 الأوردر">
        <input id="price" placeholder="💵 السعر">
        <input id="chat" placeholder="💬 سعر خدمة الدردشة">
        
        <div class="btn-group">
            <button class="btn-primary" onclick="make()">✨ توليد</button>
            <button class="btn-secondary" onclick="download()">📸 تحميل</button>
        </div>
    </div>

    <div class="invoice" id="invoice">
        <div class="brand">
            <div class="logo">
                <img id="logoImg" src="https://via.placeholder.com/35x35/00d9ff/ffffff?text=C" alt="Logo">
            </div>
            <h1 id="brandName">Click Enter</h1>
            <p>⚡ خدمات إلكترونية ⚡</p>
            <span id="invoiceId"></span>
        </div>

        <div class="row">
            <div class="box"><h3>الاسم</h3><p id="n">—</p></div>
            <div class="box"><h3>الدفع</h3><p id="p">—</p></div>
        </div>

        <div class="row">
            <div class="box"><h3>الأوردر</h3><p id="o">—</p></div>
            <div class="box"><h3>التاريخ</h3><p id="d">—</p></div>
        </div>

        <div class="row">
            <div class="box"><h3>السعر</h3><p id="pr">—</p></div>
            <div class="box"><h3>الدردشة</h3><p id="c">—</p></div>
        </div>

        <div class="total" id="t">💰 الإجمالي: 0 ج.م 💰</div>
        
        <div class="whatsapp">
            <a href="https://wa.me/201557286384" target="_blank">📱 واتساب: 01557286384</a>
        </div>
        
        <div class="invoice-footer">
            <span>Click Enter © 2026</span>
            <span class="thanks">شكرا لثقتكم بنا</span>
            <span>☝🏻𝒵𝒾𝒶𝒹 𝒯𝒽𝒶𝒷𝑒𝓉☝🏻</span>
        </div>
    </div>
</div>

<script>
function make() {
    let name = document.getElementById("name").value;
    let pay = document.getElementById("pay").value;
    let order = document.getElementById("order").value;
    let price = parseFloat(document.getElementById("price").value) || 0;
    let chat = parseFloat(document.getElementById("chat").value) || 0;
    
    let total = price + chat;
    
    document.getElementById("n").innerText = name || "—";
    document.getElementById("p").innerText = pay || "—";
    document.getElementById("o").innerText = order || "—";
    document.getElementById("pr").innerText = price.toFixed(0) + " ج.م";
    document.getElementById("c").innerText = chat.toFixed(0) + " ج.م";
    document.getElementById("t").innerHTML = "💰 " + total.toFixed(0) + " ج.م 💰";
    document.getElementById("d").innerText = new Date().toLocaleDateString("ar-EG");
    
    let invoiceNum = Math.floor(100000 + Math.random() * 900000);
    document.getElementById("invoiceId").innerHTML = "#" + invoiceNum;
}

async function download() {
    const element = document.getElementById("invoice");
    const brandName = document.getElementById("brandName");
    const originalColor = brandName.style.color;
    brandName.style.color = "#00d9ff";
    
    try {
        const canvas = await html2canvas(element, {
            scale: 3,
            backgroundColor: "#111827",
            useCORS: true,
            logging: false
        });
        
        let link = document.createElement("a");
        link.download = "ClickEnter-Invoice.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
        
    } catch (error) {
        alert("حدث خطأ");
    } finally {
        brandName.style.color = originalColor;
    }
}

document.getElementById("logoImg").src = "https://i.postimg.cc/wv6sf7Tq/file-00000000a34871fda770e277ca8c43df.png";

window.onload = function() {
    document.getElementById("name").value = "";
    document.getElementById("pay").value = "";
    document.getElementById("order").value = "";
    document.getElementById("price").value = "";
    document.getElementById("chat").value = "";
    make();
}
</script>
</body>
</html>
